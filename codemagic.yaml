workflows:
  ios-upload:
    name: Upload IPA to App Store
    max_build_duration: 60

    environment:
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "e88ece0e-46db-4476-b00b-48821c68a844"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "LV22478466"
        APP_STORE_CONNECT_TEAM_ID: "X8SC9Q44CS"
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgGZqMYMlLxOtSfkPW
          rXISxG4LkUYO+uc7P0OtAGEiOqigCgYIKoZIzj0DAQehRANCAAT4QPvbF3mWtIFW
          M0+R11sXcQrWOM2sQhEVoxi6Tt+9NtECVoZLS6kx775TtL2JN8L2H6FaEkC6vgdr
          /EGYTp6e
          -----END PRIVATE KEY-----

    scripts:
      - name: Download IPA from Google Drive (Large File Safe)
        script: |
          FILE_ID="1lD2AbVzSQVl4JvYyCWsLv-t_k1i8BEy_"
          FILE_NAME="app.ipa"

          CONFIRM=$(curl -sc /tmp/cookie "https://drive.google.com/uc?export=download&id=$FILE_ID" \
            | grep -o 'confirm=[^&]*' | sed 's/confirm=//')

          curl -Lb /tmp/cookie "https://drive.google.com/uc?export=download&confirm=$CONFIRM&id=$FILE_ID" -o $FILE_NAME

      - name: Verify IPA
        script: |
          echo "Checking file..."
          file app.ipa
          ls -lh app.ipa

      - name: Create API Key File
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8

      - name: Upload IPA to App Store
        script: |
          xcrun altool --upload-app \
            --type ios \
            --file app.ipa \
            --apiKey $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID \
            --asc-provider $APP_STORE_CONNECT_TEAM_ID
